name: DevOps CLI (Fail Test)

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Show directory structure
        run: ls -R

      - name: Check scripts existence
        run: |
          if [ -f week1-linux/scripts/system-info.sh ]; then
            echo "Script exists"
          else
            echo "Script does not exist"
          fi

      - name: Give executable permissions
        run: chmod +x week1-linux/scripts/*.sh || true

      - name: Run system info script
        run: |
          if [ -f week1-linux/scripts/system-info.sh ]; then
            ./week1-linux/scripts/system-info.sh
          else
            echo "Skipping execution"
          fi

      - name: Run CI failure test (INTENTIONAL)
        run: |
          echo "Triggering intentional failure for notification testing..."
          echo "This step will fail now"

          # ❌ Forced failure
          exit 1
